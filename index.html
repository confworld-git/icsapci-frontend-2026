    <meta
      name="description"
      content="The International Conference on Sustainable Agriculture Practices and Climate Change Impacts (ICSAPCI-2026) is a prestigious hybrid event taking place in Manila, Philippines on 16-17 Apr, 2026 which is Organized by CERADA (Confworld Educational Research and Development Association). Conference Theme is Innovations and Strategies for Sustainable Agriculture: Ensuring Food Security and Environmental Health.
      This conference welcomes research scholars, professionals, students, industrialist and scientists from diverse fields such as Agriculture, Crop production, Sustainable Crop Production, Soil Health and Management, Water Management in Agriculture, Agroecology and Biodiversity, Precision Agriculture, Climate-Smart Agriculture, Sustainable Livestock Management, Agro-industrial Waste Management, Sustainable Agro-business Models, Education and Outreach in Sustainable Agriculture, Sustainable Fisheries and Aquaculture, Urban Agriculture, Climate Change Impact and Natural Disaster, Adaptation and Mitigation Strategies, Disaster Risk Management, Innovative Solutions and Technologies, Nutrition and Climate Change.
      Attendees can submit their abstract and register to participate in keynote sessions led by industry experts. The conference will focus on SDGs (Sustainable Development Goals) and provide opportunities for publication in Scopus, SCIE and WoS journals. It offers both onsite and virtual participation, making it accessible to global audiences. Key themes include the latest trends in R&D, agriculture and sustainable development. Submissions and registration deadlines are mentioned on their website.  The mode of payments is available in USD for all the international participants, ensuring a seamless experience for those attending from abroad. Join as a keynote speaker, session speaker, session chair, organizing committee member (OCM), conference chairs, panel discussion to explore innovative ideas and research in this forward-looking event. Universities/Colleges/Institutions are most invited to join as an academic partner. Explore the world and enjoy the research journey along with CERADA!"
